[nicos]
user = "data"
group = "unx-lns"
umask = "022"

instrument = "dmc"
setup_package = "nicos_sinq"
setup_subdirs = ["dmc", "sinq_shared", "/sq_sw/linse/frappy_sinq", "/home/linse"]
services = ["cache", "poller", "daemon"]

logging_path = "/home/data/nicosdata/log"

[environment]
NICOSDUMP = "/home/data/nicosdata"
PYTHONPATH = "/sq_sw/linse/frappy:/sq_sw/linse"

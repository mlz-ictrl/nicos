[nicos]
user = "data"
group = "unx-lns"
umask = "022"

instrument = "boa"
services = ["cache", "poller", "daemon"]
setup_package = "nicos_sinq"
setup_subdirs = ["boa", "sinq_shared", "/sq_sw/linse/frappy_sinq", "/home/linse"]

logging_path = "/home/data/nicosdata/logs"

[environment]
NICOSDUMP = "/home/data/nicosdata"
BOAHM = "http://boahm/admin"
PYTHONPATH = "/sq_sw/linse/frappy:/sq_sw/linse"
